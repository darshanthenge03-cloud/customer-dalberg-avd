name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:

  ########################################
  # VALIDATE STAGE
  ########################################
  
 validate:
  name: Terraform Validate
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: envs/dev

  steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Terraform Format
      run: terraform fmt -recursive

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

  ########################################
  # PLAN STAGE
  ########################################

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: validate

    defaults:
      run:
        working-directory: envs/dev

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false

        env:
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}


  ########################################
  # APPLY STAGE
  ########################################

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    needs: plan

    defaults:
      run:
        working-directory: envs/dev

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

        env:
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
